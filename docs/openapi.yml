openapi: '3.0.3'

info:
  title: MHServer API
  version: '2.0.0'
  description: API для работы с MHServer (My Home Server)
  license:
    name: MIT

servers:
  - url: https://{domain}/api/v1
    variables:
      domain:
        default: my.best.server
        description: Домен сервера

  - url: https://{host}:{port}/api/v1
    variables:
      host:
        default: localhost
        description: Имя сервера или его IP
      port:
        default: "8080"
        description: Порт сервера

tags:
  - name: Аутентификация
    description: Аутентификация и авторизация пользователей

  - name: Сервис
    description: Операции отвечающие за определённый функционал

  - name: Файлы
    description: Работа с файлами

paths:
  /users/login:
    post:
      summary: Получение JWT пользователя
      tags: ["Аутентификация", "Сервис"]

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserLoginRequest"

      responses:
        "200":
          description: Получен JWT токен
          content:
            plain/text:
              schema:
                type: string
              example:
                value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJleHAiOjE3NzExODY5MjAsImlhdCI6MTc3MTEwMDUyMCwibmFtZSI6IlRlc3QxIiwibmJmIjoxNzcxMTAwNTIwfQ.rRD0ViwdgZxd9GG9RbW5lzThlnMN_5yX4ngcdWMSyhw
        
        "400":
          description: Плохой запрос
          content:
            plain/text:
              schema:
                type: string
              examples:
                emptyUsername:
                  $ref: "#/components/examples/EmptyUsername"

                emptyRequestBody:
                  $ref: "#/components/examples/EmptyRequestBody"

                badJsonSyntax:
                  $ref: "#/components/examples/BadJsonSyntax"

                notRegistered:
                  summary: Пользователь не зарегистрирован
                  value:
                    message: not registered
                    
                wrongPassword:
                  summary: Введён неверный пароль
                  value:
                    message: wrong password             

        "404":
          $ref: "#/components/responses/AuthServiceUnavailable"

        "500":
          $ref: "#/components/responses/InternalError" 

  /users/register:
    post:
      summary: Регистрация пользователя
      tags: ["Аутентификация", "Сервис"]

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRegisterRequest"

      responses:
        "200":
          description: Пользователь зарегистрирован
        
        "400":
          $ref: "#/components/responses/AuthRequestError"
        
        "404":
          $ref: "#/components/responses/AuthServiceUnavailable"
        
        "409":
          description: Пользователь уже зарегистрирован
          content:
            plain/text:
              schema:
                type: string
              example: user already exist

        "500":
          $ref: "#/components/responses/InternalError"
  
  /files/connect:
    post:
      parameters:
        - $ref: "#/components/parameters/Directory"

      security:
        - BearerAuth: []
      
      tags: ["Файлы", "Сервис"]
      
      summary: Получение параметров получения или отправки чанков
      description: |
        "Пропуск" к работе с файлами на сервере. Создаёт инструкцию для сервера, что конкретный файл будет использоваться (создание, изменение и т.д.). Без этой инструкции, работа с файлами не допускается.

        Также передаёт пользователю информацию о количестве чанков и их размере, необходимые для сохранения файла.

        Соединение существует 5 минут, либо пока файл не будет полностью сохранён (очевидно, при сохранении файла)
      
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectionRequest"
      
      responses:
        "200":
          description: Соединение создано и получены его параметры
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionResponse"
                    
        "400":
          description: Плохой запрос
          content:
            plain/text:
              schema:
                type: string
              examples:
                badJwtSyntax:
                  $ref: "#/components/examples/BadJwtSyntax"

                badJwtSignature:
                  $ref: "#/components/examples/BadJwtSignature"

                emptyRequestBody:
                  $ref: "#/components/examples/EmptyRequestBody"

                unspecifiedDirectory:
                  $ref: "#/components/examples/UnspecifiedDirectory"
                    
                directoryNotFound:
                  $ref: "#/components/examples/DirectoryNotFound"
                
                directoryBadSyntax:
                  $ref: "#/components/examples/DirectoryBadSyntax"
                
                emptyFilename:
                  $ref: "#/components/examples/EmptyFilename"
                
                unexpectedFiletype:
                  $ref: "#/components/examples/UnexpectedFiletype"
        
        "401":
          $ref: "#/components/responses/NotAuthorized"
        
        "413":
          description: Размер сохраняемого файла, больше свободного места на сервере
          content:
            plain/text:
              schema:
                type: string
              example:
                value: not enough disk space
        
        "500":
          $ref: "#/components/responses/InternalError"
        
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  
  /files/save:
    post:
      parameters:
        - $ref: "#/components/parameters/ConnectionID"
      
      security:
        - BearerAuth: []
      
      tags: ["Файлы", "Сервис"]

      summary: Сохранить часть файла
      description: |
        Сохраняет часть файла (чанк) на сервере. 
        
        Чтобы сохранить полный файл, необходимо отправить запрос столько раз, сколько указано в поле `chunksCount` созданного соединения.
      
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveChunk"
      
      responses:
        "200":
          description: Чанк сохранен
          
        "400":
            description: Плохой запрос
            content:
              plain/text:
                schema:
                  type: string
                examples:
                  badJwtSyntax:
                    $ref: "#/components/examples/BadJwtSyntax"

                  badJwtSignature:
                    $ref: "#/components/examples/BadJwtSignature"

                  emptyRequestBody:
                    $ref: "#/components/examples/EmptyRequestBody"
                  
                  badConnectionSyntax:
                    $ref: "#/components/examples/BadConnectionSyntax"
                    
                  connectionNotExists:
                    $ref: "#/components/examples/ConnectionNotExists"
                  
                  incorrectChunkSize:                  
                    $ref: "#/components/examples/IncorrectChunkSize"
        
        "403":
          $ref: "#/components/responses/UnexpectedFileChangeError"
                
        "401":
          $ref: "#/components/responses/NotAuthorized"

        "500":
          $ref: "#/components/responses/InternalError"
        
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  
  /files/get:
    get:
      parameters:
        - $ref: "#/components/parameters/ConnectionID"
        - $ref: "#/components/parameters/GetChunk"
      
      security:
        - BearerAuth: []
      
      tags: ["Файлы", "Сервис"]

      summary: Получить часть файла
      description: |
        Запрос возвращает файл по чанкам. 

        Чтобы получить полный файл, необходимо отправить столько запросов, сколько записано в поле `chunksCount` при создании соединения
      
      responses:
        "200":
          description: Чанк получен
          content:
            application/octet-stream:
              schema:
                $ref: "#/components/schemas/FilePart"
        
        "400":
            description: Плохой запрос
            content:
              plain/text:
                schema:
                  type: string
                examples:
                  badJwtSyntax:
                    $ref: "#/components/examples/BadJwtSyntax"

                  badJwtSignature:
                    $ref: "#/components/examples/BadJwtSignature"

                  emptyRequestBody:
                    $ref: "#/components/examples/EmptyRequestBody"
                  
                  badConnectionSyntax:
                    $ref: "#/components/examples/BadConnectionSyntax"
                    
                  connectionNotExists:
                    $ref: "#/components/examples/ConnectionNotExists"
        
        "401":
          $ref: "#/components/responses/NotAuthorized"
        
        "500":
          $ref: "#/components/responses/InternalError"
        
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  
  /files/sum:
    get:
      parameters:
        - $ref: "#/components/parameters/ConnectionID"
        - $ref: "#/components/parameters/GetChunk"
      
      security:
        - BearerAuth: []
      
      tags: ["Файлы", "Сервис"]

      summary: Получить контрольную сумму части файла
      description: |
        Используется проверки целлостности сохранённого файла. 
        
        Возвращает контрольную сумму чанка (не файла!), 
        поэтому, чтобы проверить целостность файла, необходимо сделать столько запросов, сколько указано в поле `chunksCount` при создании соединения
      
      responses:
        "200":
          description: Контрольная сумма получена
          content:
            application/octet-stream:
              schema:
                type: array
                items:
                  type: integer
                  minimum: 0
                  maximum: 255
        
        "400":
          description: Плохой запрос
          content:
            plain/text:
              schema:
                type: string
              examples:
                badJwtSyntax:
                  $ref: "#/components/examples/BadJwtSyntax"

                badJwtSignature:
                  $ref: "#/components/examples/BadJwtSignature"

                emptyRequestBody:
                  $ref: "#/components/examples/EmptyRequestBody"
                
                badConnectionSyntax:
                  $ref: "#/components/examples/BadConnectionSyntax"
                  
                connectionNotExists:
                  $ref: "#/components/examples/ConnectionNotExists"
                  
        "401":
          $ref: "#/components/responses/NotAuthorized"
        
        "500":
          $ref: "#/components/responses/InternalError"
        
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  
  /files:
    get:
      parameters:
        - $ref: "#/components/parameters/Directory"
      
      security:
        - BearerAuth: []
      
      tags: ["Файлы", "Сервис"]
      summary: Получить список файлов в каталоге
      
      responses:
        "200":
          description: Список файлов получен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilesList"
        
        "400":
          $ref: "#/components/responses/FilesDirectoryError"
        
        "401":
          $ref: "#/components/responses/NotAuthorized"
        
        "500":
          $ref: "#/components/responses/InternalError"
        
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  
  /files/space:
    get:      
      security:
        - BearerAuth: []

      tags: ["Файлы", "Сервис"]
      summary: Получить количество свободного места

      responses:
        "200":
          description: Количество свободного места в байтах получен
          content:
            plain/text:
              schema:
                type: integer
              example: 1560
        
        "400":
          description: Плохой запрос
          content:
            plain/text:
              schema:
                type: string
              examples:
                badJwtSignature:
                  $ref: "#/components/examples/BadJwtSignature"
                
                badJwtSyntax:
                  $ref: "#/components/examples/BadJwtSyntax"
        
        "401":
          $ref: "#/components/responses/NotAuthorized"
        
        "500":
          $ref: "#/components/responses/InternalError"
        
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  
  /files/mkdir:
    post:
      parameters:
        - $ref: "#/components/parameters/Directory"
      
      security:
        - BearerAuth: []
      
      tags: ["Файлы", "Сервис"]
      summary: Создать каталог

      responses:
        "200":
          description: Каталог создан
        
        "400":
          description: Плохой запрос
          content:
            plain/text:
              schema:
                type: string
              examples:
                badJwtSignature:
                  $ref: "#/components/examples/BadJwtSignature"
                
                badJwtSyntax:
                  $ref: "#/components/examples/BadJwtSyntax"
                
                unspecifiedDirectory:
                  $ref: "#/components/examples/UnspecifiedDirectory"
                
                directoryBadSyntax:
                  $ref: "#/components/examples/DirectoryBadSyntax"
                
                directoryAlreadyExist:
                  $ref: "#/components/examples/DirectoryAlreadyExist"
        
        "401":
          $ref: "#/components/responses/NotAuthorized"
        
        "500":
          $ref: "#/components/responses/InternalError"
        
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /files/rmdir:
    post:
      parameters:
        - $ref: "#/components/parameters/Directory"
      
      security:
        - BearerAuth: []
      
      tags: ["Файлы", "Сервис"]
      summary: Удалить каталог

      responses:
        "200":
          description: Каталог удалён
        
        "400":
          description: Плохой запрос
          content:
            plain/text:
              schema:
                type: string
              examples:
                badJwtSignature:
                  $ref: "#/components/examples/BadJwtSignature"
                
                badJwtSyntax:
                  $ref: "#/components/examples/BadJwtSyntax"
                
                unspecifiedDirectory:
                  $ref: "#/components/examples/UnspecifiedDirectory"
                
                directoryBadSyntax:
                  $ref: "#/components/examples/DirectoryBadSyntax"
                
                directoryNotFound:
                  $ref: "#/components/examples/DirectoryNotFound"
        
        "401":
          $ref: "#/components/responses/NotAuthorized"
        
        "500":
          $ref: "#/components/responses/InternalError"
        
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
                
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    GetChunk:
      name: chunkID
      in: query
      required: true
      description: Индекс чанка файла, контрольную сумму нужно вернуть
      schema:
        type: integer
        minimum: 0
        
    ConnectionID:
      name: connID
      in: query
      required: true
      description: UUID соединения, созданного с помощью `/files/connect`
      schema:
        type: string
        format: uuid
        minLength: 32
        maxLength: 36
    
    Directory:
      name: dir
      in: query
      required: true
      description: | 
        Каталог с файлами на сервере. 
        Параметр всегда должен начинаться с корневого каталога: `/`
      schema:
        type: string
        minLength: 1
        pattern: "^/.*"
        example: "/docs/secrets/"
  
  schemas:
    UserRegisterRequest:
      type: object
      required:
        - username
        - password
        - key

      properties:
        username:
          type: string
          example: "anton"
          maxLength: 30

        password:
          type: string
          example: "123"
        
        key:
          type: string
          example: 7qBpwuHHsi6g3vrwhk0v/gcBJ4KHbb3fBAaYlSi+Y+M=

      example:
        $ref: "./examples/auth/register-request.json"
    
    UserLoginRequest:
      type: object
      required:
        - username
        - password
      
      properties:
        username:
          type: string
          example: "anton"

        password:
          type: string
          example: "123"
      
      example:
        $ref: "./examples/auth/login-request.json"
    
    ConnectionRequest:
      type: object
      required:
        - filename
      
      properties:
        filename:
          type: string
          example: "pentagon secrets.docx"
        
        size:
          type: integer
          minimum: 0
          example: 140
      
      example:
        $ref: "./examples/data/connection-request.json"
    
    ConnectionResponse:
      type: object
      readOnly: true      
      required:
        - UUID
        - chunksSize
        - chunksCount
      
      properties:
        UUID:
          type: string
          format: uuid
          example: 2dfab521-6eed-4202-a215-1c58284c9d79
        
        chunksSize:
          description: Размер части файла в байтах для записи или чтения
          type: integer
          minimum: 0
          example: 150
        
        chunksCount:
          description: Количество частей файлов доступных для записи
          type: integer
          minimum: 0
          example: 20
      
      example:
        $ref: "./examples/data/connection-response.json"
    
    SaveChunk:
      type: object
      required:
        - chunk
        - offset
      
      properties:
        chunk:
          description: Массив байт, представляющий собой часть файла для записи
          type: array
          items:
            type: integer
            minimum: 0
            maximum: 255
          
          example: [104, 101, 108, 108, 111]
        
        offset:
          description: Отступ от начала файла, после которого будет сохранён чанк
          type: integer
          minimum: 0
          example: 255
      
      example:
        $ref: "./examples/data/save-chunk-request.json"
    
    FilePart:
      description: Массив байт, часть файла
      type: array
      items:
        type: integer
        minimum: 0
        maximum: 255
        example: 123

      example: [104, 101, 108, 108, 111]
    
    FilesList:
      type: array
      readOnly: true
      items:
        type: object
        required:
          - name
          - size
          - modTime
        
        properties:
          name:
            description: Имя файла
            type: string
            example: "cern secrets.docx"
          
          size:
            description: Размер файла в байтах
            type: integer
            minimum: 0
            example: 150
          
          modTime:
            description: UNIX время создания файла
            type: integer
            minimum: 0
            example: 1765733471

        example:
          $ref: "./examples/data/files-response.json"

  examples:
    EmptyUsername:
      summary: Поле с именем пользователя - пустое
      value:
        message: username is empty
    
    # Общие примеры

    EmptyRequestBody:
      summary: Поле запроса - пустое
      value:
        message: request body empty

    BadJsonSyntax:
      summary: Ошибка в синтаксисе JSON
      value:
        message: bad request json body
    
    BadJwtSyntax:
      description: JWT записан в неправильной форме
      value:
        message: bad jwt token
    
    BadJwtSignature:
      description: JWT имеет неверную сигнатуру
      value:
        message: jwt signature is invalid
    
    EmptyAuthorizationField:
      description: Поле `Authorization` отсутствует, либо пустое
      value:
        message: user not authorized
    
    JwtIsExpired:
      description: JWT просрочен
      value:
        message: authorization expired
    
    # Примеры ответов файлового сервиса

    EmptyFilename:
      summary: Не указано имя файла
      value:
        message: file name is empty

    UnexpectedFiletype:
      summary: Недопустимый тип файла
      value:
        message: unexpected file type
    
    BadConnectionSyntax:
      summary: UUID соединения записан в неправильной форме
      value:
        message: bad connection uuid
    
    ConnectionNotExists:
      summary: Отсутствует соединение или оно не существует
      value:
        message: connection not found or ended
    
    UnspecifiedDirectory:
      description: Не указан каталог файла
      value:
        message: target directory is not specified
    
    IncorrectChunkSize:                  
      summary: Размер чанка больше, указанного в соединении
      value:
        message: incorrect chunk size
    
    DirectoryNotFound:
      description: Каталог не найден
      value:
        message: directory not found
    
    DirectoryBadSyntax:
      description: Не верный формат пути
      value:
        message: directory have bad syntax
    
    DirectoryAlreadyExist:
      description: Каталог уже существует
      value:
        message: directory already exist

  responses:
    NotAuthorized:
      description: Не авторизован
      content:
        plain/text:
          schema:
            type: string
          examples:
            emptyAuthorizationField:
              $ref: "#/components/examples/EmptyAuthorizationField"

            jwtIsExpired:
              $ref: "#/components/examples/JwtIsExpired"

    AuthServiceUnavailable:
      description: Сервис аутентификации недоступен
    
    AuthRequestError:
      description: Плохой запрос
      content:
        plain/text:
          schema:
            type: string
          examples:
            emptyUsername:
              $ref: "#/components/examples/EmptyUsername"

            emptyRequestBody:
              $ref: "#/components/examples/EmptyRequestBody"

            badJsonSyntax:
              $ref: "#/components/examples/BadJsonSyntax"
    
    FilesDirectoryError:
      description: Ошибка в записи каталога
      content:
        plain/text:
          schema:
            type: string
          examples:
            unspecifiedDirectory:
              $ref: "#/components/examples/UnspecifiedDirectory"
                
            directoryNotFound:
              $ref: "#/components/examples/DirectoryNotFound"
            
            directoryBadSyntax:
              $ref: "#/components/examples/DirectoryBadSyntax"
    
    UnexpectedFileChangeError:
      description: Несоответствующий файл или директория
      content:
        plain/text:
          schema:
            type: string
          example:
            value: unexpected file change 

    InternalError:
      description: Внутренняя ошибка сервера
      content:
        plain/text:
          schema:
            type: string
          example:
            value: internal error
    
    ServiceUnavailable:
      description: Сервис отключен или недоступен
      content:
        plain/text:
          schema:
            type: string
          example:
            value: service is off or unavailable
    